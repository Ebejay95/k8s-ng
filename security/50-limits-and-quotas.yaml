apiVersion: v1
kind: LimitRange
metadata:
  name: navosec-default-limits
  namespace: navosec-prod
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 1
        memory: 1Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: navosec-hard-quota
  namespace: navosec-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "20"
    pods: "100"
---
