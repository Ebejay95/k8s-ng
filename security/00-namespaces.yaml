apiVersion: v1
kind: Namespace
metadata:
  name: navosec-prod
  labels:
    name: navosec-prod
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    name: observability
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    name: argocd
    # ArgoCD-Komponenten laufen baseline-konform; restricted wird zunaechst
    # nur auditiert/gewarnt, um Bestands-Workloads nicht hart zu blockieren.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    name: kyverno
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    name: ai
    # GPU-/Ollama-Workloads benoetigen ggf. baseline (Device-Plugins).
    # restricted wird auditiert/gewarnt, aber nicht erzwungen.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
