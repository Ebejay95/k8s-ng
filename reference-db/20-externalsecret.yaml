apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reference-db-credentials
  namespace: reference
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: reference-db-credentials
    creationPolicy: Owner
  data:
    # Owner (RW) – die Admin-App verwendet diese Zugangsdaten.
    - secretKey: postgres-password
      remoteRef:
        key: CHANGE_ME_ITEM_ID_REFERENCE
        property: owner-password
    # Reader (RO) – wird ins Init-Skript injiziert und von Tenants genutzt.
    - secretKey: reader-password
      remoteRef:
        key: CHANGE_ME_ITEM_ID_REFERENCE
        property: reader-password
