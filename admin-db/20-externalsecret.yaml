apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: admin-db-credentials
  namespace: navosec-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: admin-db-credentials
    creationPolicy: Owner
  data:
    # Owner-Passwort (RW) fuer die Admin-/Registry-DB.
    - secretKey: postgres-password
      remoteRef:
        key: CHANGE_ME_ITEM_ID_ADMIN_DB
        property: db-password
