apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
  labels:
    app: traefik
  # Standard-IngressClass fuer den Cluster: Ingress-Objekte ohne
  # explizite ingressClassName landen automatisch bei Traefik.
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: traefik.io/ingress-controller
