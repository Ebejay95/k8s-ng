apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
  labels:
    app: traefik
    navosec.io/tier: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
        navosec.io/tier: ingress
    spec:
      serviceAccountName: traefik
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          image: traefik:v3.1
          args:
            # Eingangs-Ports (intern, non-privileged >1024)
            - --entrypoints.web.address=:8000
            - --entrypoints.websecure.address=:8443
            # Eigener Entrypoint fuer Health-Checks (/ping)
            - --entrypoints.traefik.address=:9000
            - --ping=true
            # Standard-Kubernetes-Ingress als Quelle (keine CRDs noetig)
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=traefik
            - --api.dashboard=false
            - --log.level=INFO
          ports:
            - name: web
              containerPort: 8000
            - name: websecure
              containerPort: 8443
            - name: traefik
              containerPort: 9000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: traefik
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: traefik
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
