apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: navosec-platform
spec:
  project: platform
  source:
    repoURL: https://github.com/yourorg/k8s-ng.git
    targetRevision: main
    path: security
  destination:
    server: https://kubernetes.default.svc
    namespace: navosec-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
