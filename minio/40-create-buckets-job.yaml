apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: minio
  labels:
    app: minio
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: minio
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-01-13T08-44-48Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "warte auf minio ..."; sleep 3;
              done
              mc mb --ignore-existing local/velero
              echo "Bucket 'velero' bereit."
          env:
            - name: HOME
              value: /tmp
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
