apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Minimales LOKALES Overlay fuer Docker Desktop.
# Nimmt nur die Admin-App-Basis. ESO ist lokal nicht installiert, daher
# wird das ExternalSecret entfernt und ein Fallback-Secret (secret.yaml)
# verwendet.
resources:
  - ../../admin
  - secret.yaml

# Lokales Dummy-Image (vorher: docker build -t ghcr.io/ebejay95/dummy-admin:latest ./dummy-admin)
images:
  - name: ghcr.io/yourorg/navosec-web
    newName: ghcr.io/ebejay95/dummy-admin
    newTag: latest

patches:
  # ESO nicht vorhanden -> ExternalSecret entfernen (Secret kommt aus secret.yaml)
  - target:
      kind: ExternalSecret
      name: navosec-admin-secret
    patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: navosec-admin-secret
        namespace: navosec-admin
  # lokal nur 1 Replica
  - target:
      kind: Deployment
      name: navosec-admin
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Echtes Pull aus GHCR erzwingen (statt evtl. lokal vorhandenem Image)
  - target:
      kind: Deployment
      name: navosec-admin
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
