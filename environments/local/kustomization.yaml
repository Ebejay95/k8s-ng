apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# LOKALES Overlay fuer Docker Desktop – jetzt mit vollem In-Cluster-Datenlayer:
# Admin-App + Admin-DB + Referenz-DB + Headlamp + MinIO (Velero-Ziel).
# ESO ist lokal nicht installiert -> ExternalSecrets werden entfernt und durch
# Fallback-Secrets (secret.yaml, local-secrets.yaml, minio-Modul) ersetzt.
resources:
  - ../../reference-db
  - ../../admin-db
  - ../../admin
  - ../../headlamp
  - ../../minio
  - secret.yaml
  - local-secrets.yaml
  - tenant-rbac.yaml

# Lokales Dummy-Image (vorher: docker build -t ghcr.io/ebejay95/dummy-admin:latest ./dummy-admin)
images:
  - name: ghcr.io/yourorg/navosec-web
    newName: ghcr.io/ebejay95/dummy-admin
    newTag: latest

patches:
  # ESO nicht vorhanden -> ExternalSecret entfernen (Secret kommt aus secret.yaml)
  - target:
      kind: ExternalSecret
      name: navosec-admin-secret
    patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: navosec-admin-secret
        namespace: navosec-admin
  - target:
      kind: ExternalSecret
      name: reference-db-credentials
    patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: reference-db-credentials
        namespace: reference
  - target:
      kind: ExternalSecret
      name: admin-db-credentials
    patch: |
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: admin-db-credentials
        namespace: navosec-admin
  # lokal nur 1 Replica
  - target:
      kind: Deployment
      name: navosec-admin
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Lokal gebautes Image verwenden (docker build -t ghcr.io/ebejay95/dummy-admin:latest ./dummy-admin)
  - target:
      kind: Deployment
      name: navosec-admin
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
