apiVersion: v1
kind: Secret
metadata:
  name: navosec-admin-secret
  namespace: navosec-admin
  labels:
    app: navosec-admin
type: Opaque
# Nur fuer den lokalen Docker-Desktop-Test. Die Dummy-App nutzt diese Werte
# nicht wirklich, das Secret muss aber existieren (envFrom secretRef).
stringData:
  ConnectionStrings__DefaultConnection: "Host=admin-db.navosec-admin.svc.cluster.local;Port=5432;Database=navosec_admin;Username=navosec_admin;Password=localdev-admin-pw"
  ConnectionStrings__Reference: "Host=reference-db.reference.svc.cluster.local;Port=5432;Database=reference;Username=reference_owner;Password=localdev-owner-pw"
  ConnectionStrings__Redis: "localhost:6379"
  Auth__Google__ClientId: "dummy"
  Auth__Google__ClientSecret: "dummy"
