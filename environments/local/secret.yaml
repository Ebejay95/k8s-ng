apiVersion: v1
kind: Secret
metadata:
  name: navosec-admin-secret
  namespace: navosec-admin
  labels:
    app: navosec-admin
type: Opaque
# Nur fuer den lokalen Docker-Desktop-Test. Die Dummy-App nutzt diese Werte
# nicht wirklich, das Secret muss aber existieren (envFrom secretRef).
stringData:
  ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=dummy;Username=dummy;Password=dummy"
  ConnectionStrings__Redis: "localhost:6379"
  Auth__Google__ClientId: "dummy"
  Auth__Google__ClientSecret: "dummy"
