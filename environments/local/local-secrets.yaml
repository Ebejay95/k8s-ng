# Lokale Fallback-Secrets (ESO ist auf Docker Desktop nicht installiert).
# Werte NUR fuer den lokalen Betrieb. In prod kommen sie aus Vaultwarden.
apiVersion: v1
kind: Secret
metadata:
  name: reference-db-credentials
  namespace: reference
  labels:
    app: reference-db
type: Opaque
stringData:
  postgres-password: localdev-owner-pw
  reader-password: localdev-reader-pw
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-db-credentials
  namespace: navosec-admin
  labels:
    app: admin-db
type: Opaque
stringData:
  postgres-password: localdev-admin-pw
