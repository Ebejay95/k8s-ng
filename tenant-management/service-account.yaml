---
# ServiceAccount + RBAC für Tenant Manager
# Verwendet von: Tenant Creation/Deletion/Scaling/Backup Jobs

apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-manager
  namespace: navosec-prod
  labels:
    app: tenant-management
    component: rbac

---
# Role: Minimale Permissions für Tenant Manager
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-manager
  namespace: navosec-prod
  labels:
    app: tenant-management
    component: rbac
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]

  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]

  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete", "watch"]

  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]

  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "update", "patch"]

  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
# RoleBinding: ServiceAccount → Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-manager
  namespace: navosec-prod
  labels:
    app: tenant-management
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-manager
subjects:
  - kind: ServiceAccount
    name: tenant-manager
    namespace: navosec-prod

---
# ClusterRole: Cluster-weite Permissions für vollstaendige Tenant-Trennung.
# Notwendig, weil Tenants dynamische Namespaces erhalten und Nodes je Tenant
# gelabelt + getaintet werden (Node-Ausrollung).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-manager
  labels:
    app: tenant-management
    component: rbac
rules:
  # Node-Pinning je Tenant (Label + Taint)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Dynamische Tenant-Namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "delete", "patch"]

  # Tenant-Workload-Ressourcen in beliebigen tenant-* Namespaces
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "serviceaccounts", "persistentvolumeclaims", "events"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-manager
  labels:
    app: tenant-management
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-manager
subjects:
  - kind: ServiceAccount
    name: tenant-manager
    namespace: navosec-prod
  # Admin-App provisioniert Tenants direkt ueber die Kubernetes-API
  # (Namespaces/Quotas/LimitRanges/NetworkPolicies) statt ueber Jobs.
  - kind: ServiceAccount
    name: navosec-admin
    namespace: navosec-admin

---
# Role: erlaubt der Admin-App (Control-Plane), Tenant-Provisionierungs-Jobs
# anzustossen und deren Status/Logs zu lesen. Damit kann die Node- und
# Tenant-Ausrollung direkt aus der Admin-App gesteuert werden.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-orchestrator
  namespace: navosec-prod
  labels:
    app: tenant-management
    component: rbac
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-app-tenant-orchestrator
  namespace: navosec-prod
  labels:
    app: tenant-management
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-orchestrator
subjects:
  - kind: ServiceAccount
    name: navosec-admin
    namespace: navosec-admin
