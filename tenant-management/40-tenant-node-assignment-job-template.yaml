apiVersion: batch/v1
kind: Job
metadata:
  name: tenant-node-assign-template
  labels:
    app: tenant-management
    operation: node-assign
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: tenant-management
        operation: node-assign
    spec:
      serviceAccountName: tenant-manager
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node-assign
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if [ -z "${TENANT_ID}" ] || [ "${TENANT_ID}" = "TENANT_ID" ]; then
                echo "TENANT_ID ist nicht gesetzt."; exit 1
              fi
              if [ -z "${NODE_NAME}" ] || [ "${NODE_NAME}" = "NODE_NAME" ]; then
                echo "NODE_NAME ist nicht gesetzt."; exit 1
              fi

              ACTION="${ACTION:-assign}"

              if ! kubectl get node "${NODE_NAME}" >/dev/null 2>&1; then
                echo "Node ${NODE_NAME} existiert nicht."; exit 1
              fi

              if [ "${ACTION}" = "release" ]; then
                echo "Releasing node ${NODE_NAME} from tenant ${TENANT_ID}"
                kubectl label node "${NODE_NAME}" "tenant.navosec.io/dedicated-" --overwrite
                kubectl taint node "${NODE_NAME}" "tenant.navosec.io/dedicated:NoSchedule-" || true
                echo "Node ${NODE_NAME} freigegeben."
                exit 0
              fi

              CURRENT=$(kubectl get node "${NODE_NAME}" -o jsonpath="{.metadata.labels.tenant\.navosec\.io/dedicated}" 2>/dev/null || true)
              if [ -n "${CURRENT}" ] && [ "${CURRENT}" != "${TENANT_ID}" ]; then
                echo "Node ${NODE_NAME} gehoert bereits Tenant ${CURRENT}. Abbruch."; exit 1
              fi

              echo "Assigning node ${NODE_NAME} to tenant ${TENANT_ID}"
              kubectl label node "${NODE_NAME}" "tenant.navosec.io/dedicated=${TENANT_ID}" --overwrite
              kubectl taint node "${NODE_NAME}" "tenant.navosec.io/dedicated=${TENANT_ID}:NoSchedule" --overwrite
              echo "Node ${NODE_NAME} ist jetzt dediziert fuer Tenant ${TENANT_ID}."
          env:
            - name: TENANT_ID
              value: TENANT_ID
            - name: NODE_NAME
              value: NODE_NAME
            - name: ACTION
              value: assign
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
