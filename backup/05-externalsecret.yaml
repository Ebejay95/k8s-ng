# A5/A12: DB- und S3-Zugangsdaten kommen aus Vaultwarden (keine Klartext-
# Credentials im Manifest). Wird vom postgres-nightly-backup CronJob genutzt.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-backup-credentials
  namespace: navosec-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: postgres-backup-credentials
    creationPolicy: Owner
  data:
    - secretKey: PGHOST
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: pg-host
    - secretKey: PGPORT
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: pg-port
    - secretKey: PGDATABASE
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: pg-database
    - secretKey: PGUSER
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: pg-user
    - secretKey: PGPASSWORD
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: pg-password
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: s3-access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: s3-secret-key
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: s3-region
    - secretKey: S3_BUCKET
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: s3-bucket
    - secretKey: S3_PREFIX
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: s3-prefix
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: CHANGE_ME_ITEM_ID_BACKUP
        property: s3-endpoint
