# A5: Cluster-weite Sicherung (Ressourcen-Manifeste + PersistentVolumes).
# Deckt Control-Plane-nahe und Plattform-Namespaces ab.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: cluster-daily
  namespace: velero
spec:
  schedule: "0 1 * * *"
  template:
    ttl: 720h0m0s
    snapshotVolumes: true
    defaultVolumesToFsBackup: true
    includedNamespaces:
      - navosec-admin
      - navosec-prod
      - reference
      - observability
      - external-secrets
      - kyverno
      - argocd
---
# A5: Sicherung aller Tenant-Namespaces (dynamisch) ueber das Tier-Label.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: tenants-daily
  namespace: velero
spec:
  schedule: "30 1 * * *"
  template:
    ttl: 720h0m0s
    snapshotVolumes: true
    defaultVolumesToFsBackup: true
    includedNamespaces:
      - "*"
    labelSelector:
      matchLabels:
        navosec.io/tier: tenant
