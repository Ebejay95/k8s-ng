apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-backup
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-nightly-backup
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: postgres-backup
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:16
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TS=$(date +%Y%m%d-%H%M%S)
                  OUT=/tmp/navosec-${TS}.sql.gz
                  pg_dump -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" "${PGDATABASE}" | gzip > ${OUT}
                  echo "Backup created at ${OUT}. Upload to S3/Minio in next step."
              env:
                - name: PGHOST
                  value: 10.0.1.200
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  value: navosec_master
                - name: PGUSER
                  value: navosec
                - name: PGPASSWORD
                  value: CHANGE_ME
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
