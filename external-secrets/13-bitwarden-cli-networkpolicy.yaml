apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-only-external-secrets-to-bitwarden-cli
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bitwarden-cli
      app.kubernetes.io/instance: bitwarden-cli
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: external-secrets
          podSelector:
            matchLabels:
              app.kubernetes.io/name: external-secrets
