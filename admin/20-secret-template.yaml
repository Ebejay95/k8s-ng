apiVersion: v1
kind: Secret
metadata:
  name: navosec-admin-secret
  namespace: navosec-admin
  labels:
    app: navosec-admin
type: Opaque
# NUR Fallback / Notfall. Im Standard-Flow wird dieses Secret von
# External Secrets (21-externalsecret.yaml) aus Vaultwarden befuellt.
stringData:
  # Zentrale Tenant-Registry / Admin-DB (getrennt von Kundendatenbanken).
  ConnectionStrings__DefaultConnection: "Host=admin-db.navosec-admin.svc.cluster.local;Port=5432;Database=navosec_admin;Username=navosec_admin;Password=CHANGE_ME"
  ConnectionStrings__Redis: redis:6379,password=CHANGE_ME
  Auth__Google__ClientId: CHANGE_ME
  Auth__Google__ClientSecret: CHANGE_ME
