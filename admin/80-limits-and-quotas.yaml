apiVersion: v1
kind: LimitRange
metadata:
  name: navosec-admin-default-limits
  namespace: navosec-admin
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 1
        memory: 1Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: navosec-admin-hard-quota
  namespace: navosec-admin
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
    pods: "30"
