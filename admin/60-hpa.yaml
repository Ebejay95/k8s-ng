apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: navosec-admin
  namespace: navosec-admin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: navosec-admin
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
