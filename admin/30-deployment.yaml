apiVersion: v1
kind: ServiceAccount
metadata:
  name: navosec-admin
  namespace: navosec-admin
  labels:
    app: navosec-admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navosec-admin
  namespace: navosec-admin
  labels:
    app: navosec-admin
    navosec.io/tier: admin
spec:
  replicas: 2
  # A19: rollierendes Update haelt bei Restart/Update die Verfuegbarkeit
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: navosec-admin
  template:
    metadata:
      labels:
        app: navosec-admin
        navosec.io/tier: admin
    spec:
      serviceAccountName: navosec-admin
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      # A19: Replikas ueber Nodes/Zonen verteilen (Ausfall eines
      # Brandabschnitts fuehrt nicht zum Ausfall der Anwendung)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: navosec-admin
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: navosec-admin
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: navosec-admin
      # A6: Initialisierung im eigenen Init-Container. Weitere Container
      # starten erst nach erfolgreicher Initialisierung (DB erreichbar).
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Warte auf Datenbank 10.0.1.200:5432 ..."
              until nc -z -w 2 10.0.1.200 5432; do
                echo "DB nicht erreichbar - retry in 2s"; sleep 2;
              done
              echo "DB erreichbar - Initialisierung erfolgreich"
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: app
          image: ghcr.io/yourorg/navosec-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: navosec-admin-config
            - secretRef:
                name: navosec-admin-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
