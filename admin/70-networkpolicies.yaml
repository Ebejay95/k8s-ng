apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: navosec-admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: navosec-admin
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Nur Traefik darf die Admin-App erreichen (admin.<domain>)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-traefik
  namespace: navosec-admin
spec:
  podSelector:
    matchLabels:
      app: navosec-admin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: traefik
      ports:
        - protocol: TCP
          port: 8080
---
# Admin-App Egress: DNS, Admin-DB, Referenz-DB (RW), Tenant-DBs (brokered),
# HTTPS (Google OAuth, Kubernetes-API, ACME, Vault-API).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns-db-https
  namespace: navosec-admin
spec:
  podSelector:
    matchLabels:
      app: navosec-admin
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Admin-DB (Tenant-Registry)
    - to:
        - ipBlock:
            cidr: 10.0.1.200/32
      ports:
        - protocol: TCP
          port: 5432
    # Stammdaten-/Referenz-DB (Admin schreibt). PLATZHALTER-IP.
    - to:
        - ipBlock:
            cidr: 10.0.1.201/32
      ports:
        - protocol: TCP
          port: 5432
    # Cross-Tenant (brokered): Admin darf on-demand jede Tenant-DB im
    # Tenant-DB-Netz erreichen. Read-only bzw. welcher Tenant wird ueber
    # DB-Rollen + Laufzeit-Credentials gesteuert, NICHT hier. PLATZHALTER-CIDR.
    - to:
        - ipBlock:
            cidr: 10.0.2.0/24
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
